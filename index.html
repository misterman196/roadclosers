<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Closers - Northern Ireland</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Road Closers - Northern Ireland</h1>
        <p>Click on any road on the map to mark it as under construction.</p>
    </header>
    
    <main>
        <div id="map"></div>
        <div id="loading">Fetching road data</div>
        <div id="controls">
            <h2>Under Construction</h2>
            <ul id="road-list">
                <!-- List of roads will be populated here -->
            </ul>
            <button id="clear-all">Clear All</button>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
